<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Topic 8.7 — Nelson Mandela released from Victor Verster Prison, 1990</title><desc id="desc">Local BeHistorical artwork for Global Resistance to Established Power Structures After 1900. Historical anchor: Nelson Mandela leaving Victor Verster Prison on February 11, 1990, after 27 years of imprisonment. Mandela&apos;s release marked the beginning of negotiations that ended apartheid and led to South Africa&apos;s first democratic elections in 1994..</desc>
