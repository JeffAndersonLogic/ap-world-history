  <rect width="1200" height="800" fill="url(#bg)"/><circle cx="755" cy="168" r="420" fill="url(#glow)"/><circle cx="1019" cy="610" r="330" fill="url(#glow)" opacity=".7"/>
  <g fill="none" stroke="#c9a46a" opacity=".18"><path d="M0 655 1200 145M0 735 1200 225" stroke-width="3"/><circle cx="850" cy="400" r="255" stroke-width="4"/><circle cx="850" cy="400" r="285" stroke-width="2"/></g>
  <g color="#c9a46a" opacity=".82"><circle cx="850" cy="400" r="185" fill="none" stroke="currentColor" stroke-width="20"/><path d="m750 405 70 70 145-165" fill="none" stroke="currentColor" stroke-width="26"/></g>
