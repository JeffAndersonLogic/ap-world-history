<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">FOUNDATIONS 3 — The Templo Mayor, Tenochtitlan (Aztec, c.1325–1521 CE)</title><desc id="desc">Local BeHistorical artwork for States, Power &amp; Social Organization. Historical anchor: The Templo Mayor at the center of Tenochtitlan rose 60 meters above the island city. At its summit were twin shrines — one to Huitzilopochtli (sun and war god demanding human sacrifice) and one to Tlaloc (rain god demanding child sacrifice). The temple was not just religious architecture; it was the physical center of the Aztec cosmological claim that their state was sustaining the universe itself..</desc>
