<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
<title id="title">Developments in Europe, c. 1200 to c. 1450</title>
<desc id="desc">Instructional locator map showing medieval Europe as politically fragmented but connected by Christianity, trade, towns, and universities.</desc>
<rect width="1200" height="720" fill="#f5f0e7"/>
<rect x="45" y="45" width="1110" height="630" rx="18" fill="#fffdf7" stroke="#5a5f5c" stroke-width="3"/>
<text x="600" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#1a1c1d">Developments in Europe, c. 1200–1450</text>
<text x="600" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#5a5f5c">Fragmented political authority, the Roman Catholic Church, towns, trade, and universities</text>
<path d="M370 165 C500 130 620 165 720 250 C820 335 820 470 730 565 C625 660 465 620 365 535 C260 445 255 270 370 165 Z" fill="#d2b48c" stroke="#8c5a2b" stroke-width="3"/>
<path d="M555 175 L570 620" stroke="#6b3e1f" stroke-width="3" stroke-dasharray="9 9" opacity=".6"/>
<path d="M330 355 L805 355" stroke="#6b3e1f" stroke-width="3" stroke-dasharray="9 9" opacity=".6"/>
<circle cx="440" cy="310" r="10" fill="#1a1c1d"/><text x="440" y="288" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">France</text>
<circle cx="585" cy="300" r="10" fill="#1a1c1d"/><text x="585" y="278" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Holy Roman Empire</text>
<circle cx="610" cy="445" r="10" fill="#1a1c1d"/><text x="610" y="473" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Italian city-states</text>
<circle cx="505" cy="390" r="10" fill="#1a1c1d"/><text x="505" y="418" text-anchor="middle" font-family="Arial" font-size="20" font-weight="700">Rome / Church</text>
<path d="M390 410 C485 385 600 405 700 455" fill="none" stroke="#3e4447" stroke-width="5" stroke-dasharray="14 12" opacity=".7"/>
<text x="780" y="250" font-family="Arial" font-size="21" fill="#1a1c1d">Many kingdoms and local powers</text>
<text x="780" y="305" font-family="Arial" font-size="21" fill="#1a1c1d">Shared Christian culture</text>
<text x="780" y="360" font-family="Arial" font-size="21" fill="#1a1c1d">Growing towns and trade</text>
<line x1="755" y1="245" x2="620" y2="300" stroke="#5a5f5c" stroke-width="3"/>
<line x1="755" y1="302" x2="515" y2="392" stroke="#5a5f5c" stroke-width="3"/>
<line x1="755" y1="356" x2="640" y2="445" stroke="#5a5f5c" stroke-width="3"/>
<g transform="translate(84 594)"><rect width="500" height="48" rx="8" fill="#1a1c1d"/><text x="18" y="31" font-family="Arial" font-size="18" fill="#f5f0e7">Locator map: Europe as fragmented but religiously connected</text></g>
</svg>