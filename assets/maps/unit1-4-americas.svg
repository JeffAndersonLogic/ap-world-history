<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc"><title id="title">Unit 1.4 Map: State Building in the Americas</title><desc id="desc">Instructional locator map showing Mesoamerica, the Andes, Mexica, Inca, Maya, and Cahokia for AP World History Topic 1.4.</desc><defs><style>.bg{fill:#f5f0e7}.land{fill:#d9c7a8;stroke:#2b2f31;stroke-width:3}.water{fill:#24343f}.label{font-family:Montserrat,Arial,sans-serif;fill:#151718;font-size:24px;font-weight:700}.small{font-size:17px;font-weight:600}.note{font-size:15px;font-weight:500}.route{fill:none;stroke:#8c5a2b;stroke-width:5;stroke-dasharray:11 9}.pin{fill:#a8652d;stroke:#1a1c1d;stroke-width:3}.zone{fill:#c9a46a;opacity:.38;stroke:#8c5a2b;stroke-width:3}.mount{fill:none;stroke:#6b3e1f;stroke-width:4;stroke-linecap:round}.title{font-family:Cinzel,Georgia,serif;fill:#151718;font-size:35px;font-weight:700}.subtitle{font-family:Montserrat,Arial,sans-serif;fill:#3e4447;font-size:17px;font-weight:600;letter-spacing:1px}</style></defs><rect width="1200" height="720" class="bg"/><rect width="1200" height="155" fill="#1a1c1d"/><text x="60" y="68" fill="#c9a46a" class="subtitle">AP WORLD HISTORY · UNIT 1 · TOPIC 1.4</text><text x="60" y="118" fill="#fffdf7" class="title">State Building in the Americas</text><rect x="740" y="32" width="390" height="88" rx="4" fill="#2b2f31" stroke="#c9a46a"/><text x="760" y="67" fill="#d2b48c" class="subtitle">Geographic Takeaway</text><text x="760" y="96" fill="#fffdf7" class="note">American states adapted to lakes,</text><text x="760" y="116" fill="#fffdf7" class="note">mountains, rivers, and distance.</text><rect x="0" y="155" width="1200" height="565" class="water"/><path class="land" d="M315 170 C250 225 228 285 238 350 C250 420 230 475 170 540 C135 580 153 628 208 652 C270 682 345 642 382 585 C423 520 442 468 432 410 C422 350 453 320 500 292 C552 260 552 203 505 176 C460 151 370 142 315 170 Z"/><path class="land" d="M560 264 C608 304 610 354 585 405 C562 452 580 500 620 538 C660 576 672 645 636 696 L770 696 C793 635 790 575 760 520 C735 474 728 420 755 372 C785 317 763 270 708 244 C655 220 600 227 560 264 Z"/><path class="land" d="M140 258 C205 212 290 197 360 220 C320 255 288 300 255 345 C210 337 168 316 140 258 Z"/><ellipse class="zone" cx="336" cy="362" rx="115" ry="80"/><text x="244" y="348" class="label">Mesoamerica</text><text x="288" y="376" class="small label">Mexica / Maya</text><circle class="pin" cx="343" cy="335" r="12"/><text x="362" y="329" class="small label">Tenochtitlan</text><circle class="pin" cx="326" cy="404" r="10"/><text x="345" y="412" class="small label">Maya cities</text><ellipse class="zone" cx="674" cy="520" rx="85" ry="178"/><text x="705" y="458" class="label">Andes</text><text x="706" y="486" class="small label">Inca</text><circle class="pin" cx="662" cy="508" r="12"/><text x="682" y="516" class="small label">Cusco</text><path class="route" d="M640 348 C662 430 665 512 652 666"/><path class="mount" d="M612 342 l18 32 l18-32"/><path class="mount" d="M641 395 l18 32 l18-32"/><path class="mount" d="M630 450 l18 32 l18-32"/><path class="mount" d="M650 585 l18 32 l18-32"/><ellipse class="zone" cx="245" cy="260" rx="95" ry="50"/><circle class="pin" cx="250" cy="260" r="10"/><text x="275" y="257" class="small label">Cahokia / Mississippian</text><line x1="760" y1="588" x2="1110" y2="588" stroke="#c9a46a" stroke-width="4"/><text x="760" y="626" fill="#fffdf7" class="small label">Key: shaded areas = major cultural/state zones</text><text x="760" y="654" fill="#fffdf7" class="note">Dashed line = Inca road-system corridor</text></svg>